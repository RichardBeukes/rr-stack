<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrimmGear Media Stack</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232733;
            --border: #2d3140;
            --text: #e4e6ed;
            --text-dim: #8b8fa3;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.15);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.15);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.15);
            --amber: #f59e0b;
            --amber-dim: rgba(245,158,11,0.15);
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.15);
            --purple: #a855f7;
            --purple-dim: rgba(168,85,247,0.15);
            --cyan: #06b6d4;
            --cyan-dim: rgba(6,182,212,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header h1 span { color: var(--accent); }
        .header-meta { display: flex; gap: 16px; align-items: center; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-g { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot-r { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .dot-a { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
        .header-time { color: var(--text-dim); font-size: 13px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; padding: 24px 32px; }
        .grid-w { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; cursor: pointer; }
        .card:hover { border-color: var(--accent); }
        .ch { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ct { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); }
        .cv { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
        .cs { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
        .ci { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .sc { padding: 0; overflow: hidden; }
        .sh { padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .sn { font-size: 16px; font-weight: 600; }
        .sp { font-size: 12px; color: var(--text-dim); background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
        .sb { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hl { list-style: none; }
        .hi { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
        .hi:last-child { border-bottom: none; }
        .hb { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
        .hb-e { background: var(--red-dim); color: var(--red); }
        .hb-w { background: var(--amber-dim); color: var(--amber); }
        .hb-o { background: var(--green-dim); color: var(--green); }
        .hm { font-size: 13px; color: var(--text-dim); }
        .dl { max-height: 300px; overflow-y: auto; }
        .di { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .di:last-child { border-bottom: none; }
        .dn { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .db { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; }
        .df { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s; }
        .dm { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .ir { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .ir:last-child { border-bottom: none; }
        .in { font-weight: 500; }
        .st { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); padding: 16px 32px 0; }
        .ld { color: var(--text-dim); font-size: 13px; padding: 12px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>GrimmGear</span> Media Stack</h1>
        <div class="header-meta">
            <span class="dot dot-g" id="gs"></span>
            <span class="header-time" id="lu">Loading...</span>
        </div>
    </div>
    <div class="grid" id="ts"></div>
    <div class="st">Services</div>
    <div class="grid grid-w" id="svcs"></div>
    <div class="st">Health &amp; Activity</div>
    <div class="grid grid-w">
        <div class="card">
            <div class="ch"><span class="ct">Health Warnings</span></div>
            <ul class="hl" id="hl"><li class="ld">Checking...</li></ul>
        </div>
        <div class="card">
            <div class="ch"><span class="ct">Active Downloads</span><span class="ct" id="dt"></span></div>
            <div class="dl" id="dll"><div class="ld">Loading...</div></div>
        </div>
    </div>
    <div class="st">Indexers (Prowlarr)</div>
    <div class="grid grid-w">
        <div class="card">
            <div class="ch"><span class="ct">Configured Indexers</span></div>
            <div id="il"><div class="ld">Loading...</div></div>
        </div>
        <div class="card">
            <div class="ch"><span class="ct">GrimmGear Improvements</span></div>
            <ul class="hl" id="imp"></ul>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
